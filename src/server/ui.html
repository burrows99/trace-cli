<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>trace · live execution traces</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1d212a; --border: #272c37;
    --text: #e6e9ef; --muted: #8b93a7; --accent: #6ea8fe; --green: #3fb950; --red: #f85149;
    --amber: #d29922; --cdp: #f0883e; --dap: #6ea8fe; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 13px/1.5 system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .sub { color: var(--muted); font-size: 12px; }
  .live { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .spacer { flex: 1; }
  button { background: var(--panel2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
  button:hover { border-color: var(--accent); }
  main { flex: 1; display: grid; grid-template-columns: 340px 1fr; min-height: 0; }
  .list { border-right: 1px solid var(--border); overflow-y: auto; background: var(--panel); }
  .card { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .card:hover { background: var(--panel2); }
  .card.sel { background: var(--panel2); border-left: 3px solid var(--accent); padding-left: 11px; }
  .card.flash { animation: flash 1.1s ease-out; }
  @keyframes flash { from { background: rgba(110,168,254,.22); } to { background: transparent; } }
  .card .cmd { font-family: var(--mono); font-size: 12.5px; font-weight: 600; }
  .card .row2 { display: flex; align-items: center; gap: 6px; margin-top: 5px; color: var(--muted); font-size: 11.5px; }
  .badge { font-size: 10.5px; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); text-transform: uppercase; letter-spacing: .4px; }
  .badge.cdp { color: var(--cdp); border-color: var(--cdp); }
  .badge.dap { color: var(--dap); border-color: var(--dap); }
  .status { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .status.ok { background: var(--green); } .status.err { background: var(--red); }
  .detail { overflow-y: auto; padding: 0; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .dhead { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 1; }
  .dhead .cmd { font-family: var(--mono); font-size: 15px; font-weight: 600; }
  .dhead .meta { color: var(--muted); font-size: 12px; margin-top: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
  .dhead .trigger { font-family: var(--mono); color: var(--accent); font-size: 11.5px; margin-top: 6px; word-break: break-all; }
  .events { padding: 8px 0; }
  .evt { border-bottom: 1px solid var(--border); }
  .evt > .head { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; }
  .evt > .head:hover { background: var(--panel2); }
  .seq { color: var(--muted); font-family: var(--mono); font-size: 11px; min-width: 26px; }
  .kind { font-size: 10.5px; padding: 1px 6px; border-radius: 4px; background: var(--panel2); border: 1px solid var(--border); color: var(--muted); }
  .loc { font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .label { font-family: var(--mono); font-size: 12px; }
  .t { color: var(--muted); font-size: 11px; margin-left: auto; font-family: var(--mono); }
  .body { padding: 4px 20px 14px 56px; display: none; }
  .evt.open .body { display: block; }
  .sec { margin-top: 10px; }
  .sec h4 { margin: 0 0 5px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  table.kv { border-collapse: collapse; width: 100%; }
  table.kv td { padding: 2px 10px 2px 0; font-family: var(--mono); font-size: 12px; vertical-align: top; }
  table.kv td.k { color: var(--amber); white-space: nowrap; }
  table.kv td.v { color: var(--text); word-break: break-all; }
  .stack div { font-family: var(--mono); font-size: 11.5px; color: var(--muted); padding: 1px 0; }
  .stack div b { color: var(--text); font-weight: 500; }
  pre.resp { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 11.5px; overflow-x: auto; margin: 0; }
  .mutations { padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--panel2); border-left: 3px solid var(--accent); }
  .mutations > h4 { margin: 0; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; }
  .mutations > .legend { display: flex; flex-wrap: wrap; align-items: center; gap: 5px 14px; margin: 6px 0 12px; font-size: 11px; color: var(--muted); }
  .mutations > .legend .li { display: inline-flex; align-items: center; gap: 6px; }
  .mutations > .legend .sep { width: 1px; align-self: stretch; background: var(--border); margin: 1px 2px; }
  .mutations > .legend .sym { font-family: var(--mono); font-weight: 700; font-size: 13px; line-height: 1; }
  .mutations > .legend .sym.expr { color: var(--accent); }
  .mutations > .legend .sym.local { color: var(--amber); }
  .mutations > .legend .arr { color: var(--accent); opacity: .6; font-family: var(--mono); font-weight: 700; }
  .mutations > .legend .sw { font-family: var(--mono); padding: 1px 6px; border-radius: 3px; background: var(--bg); border: 1px solid var(--border); }
  .mutations > .legend .sw.val { color: var(--muted); }
  .mutations > .legend .sw.chg { color: var(--text); font-weight: 600; }
  .mutations > .legend .sw.last { color: var(--green); font-weight: 600; }
  .mrow { display: flex; align-items: baseline; gap: 12px; padding: 4px 0; font-family: var(--mono); font-size: 12.5px; }
  .mname { min-width: 130px; font-weight: 600; white-space: nowrap; }
  .mname.expr { color: var(--accent); } .mname.local { color: var(--amber); }
  .mpath { flex: 1; word-break: break-all; }
  .mpath .val { color: var(--muted); }
  .mpath .chg { color: var(--text); font-weight: 600; }
  .mpath .last { color: var(--green); font-weight: 600; }
  .mpath .arr { color: var(--accent); opacity: .6; padding: 0 5px; }
  .mcount { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .recording { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .recording > h4 { margin: 0 0 8px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .recording video { max-width: 520px; width: 100%; border: 1px solid var(--border); border-radius: 6px; background: #000; display: block; }
  .recording .rlink { margin-top: 6px; font-family: var(--mono); font-size: 11px; word-break: break-all; }
  .recording .rlink a { color: var(--accent); }
  .diag { font-size: 12px; padding: 6px 20px; }
  .diag.error { color: var(--red); } .diag.warn { color: var(--amber); }
  .diag.error::before { content: "✗ "; } .diag.warn::before { content: "⚠ "; }
</style>
</head>
<body>
<header>
  <h1>trace</h1>
  <span class="sub">live execution traces</span>
  <span class="live"><span class="dot" id="dot"></span><span id="livetxt">connecting…</span></span>
  <span class="spacer"></span>
  <span class="sub" id="count">0 sessions</span>
  <button id="clear">Clear</button>
</header>
<main>
  <div class="list" id="list"></div>
  <div class="detail" id="detail"><div class="empty">Select a session, or run<br><code>trace dynamic … --emit http://localhost:4000</code></div></div>
</main>
<script>
const $ = (s) => document.querySelector(s);
const listEl = $("#list"), detailEl = $("#detail");
let sessions = new Map(), selected = null;

const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
function ago(at) {
  if (!at) return "";
  const s = Math.max(0, (Date.now() - new Date(at).getTime()) / 1000);
  if (s < 60) return Math.floor(s) + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  return Math.floor(s / 3600) + "h ago";
}
const srcBadge = (s) => s ? `<span class="badge ${s}">${esc(s)}</span>` : "";

function renderList() {
  const rows = [...sessions.values()].sort((a, b) => String(b.at || "").localeCompare(String(a.at || "")));
  $("#count").textContent = rows.length + " session" + (rows.length === 1 ? "" : "s");
  listEl.innerHTML = rows.map((s) => `
    <div class="card ${selected === s.sessionId ? "sel" : ""}" data-id="${esc(s.sessionId)}">
      <div class="cmd">${esc(s.command || "?")}</div>
      <div class="row2">
        <span class="status ${s.ok === false ? "err" : "ok"}"></span>
        ${srcBadge(s.source)}
        <span>${s.eventCount} ev</span>
        ${s.durationMs != null ? `<span>· ${s.durationMs}ms</span>` : ""}
        ${s.errors ? `<span style="color:var(--red)">· ${s.errors}✗</span>` : ""}
        ${s.warns ? `<span style="color:var(--amber)">· ${s.warns}⚠</span>` : ""}
        <span class="spacer" style="flex:1"></span>
        <span>${ago(s.at)}</span>
      </div>
    </div>`).join("");
}

function kvTable(obj) {
  const ks = Object.keys(obj || {});
  if (!ks.length) return "";
  return `<table class="kv">${ks.map((k) => `<tr><td class="k">${esc(k)}</td><td class="v">${esc(typeof obj[k] === "object" ? JSON.stringify(obj[k]) : obj[k])}</td></tr>`).join("")}</table>`;
}

function renderRecording(rec) {
  if (!rec) return "";
  if (rec.url) {
    const kb = rec.bytes ? ` · ${Math.round(rec.bytes / 1024)} KB` : "";
    return `<div class="recording"><h4>recording${kb}</h4>
      <video controls preload="metadata" src="${esc(rec.url)}"></video>
      <div class="rlink"><a href="${esc(rec.url)}" target="_blank">${esc(rec.url)}</a></div></div>`;
  }
  return `<div class="recording"><h4>recording (local)</h4>
    <div class="rlink">${esc(rec.path)} <span style="color:var(--muted)">— set S3_ENDPOINT to get a shareable link</span></div></div>`;
}

function renderMutations(lineage) {
  if (!lineage || !lineage.length) return "";
  const fmt = (v) => esc(typeof v === "object" ? JSON.stringify(v) : v);
  const rows = lineage.map((tr) => {
    const steps = tr.series.filter((s, i) => s.changed || i === 0);
    const path = steps.map((s, i) => {
      const cls = i === steps.length - 1 ? "last" : s.changed ? "chg" : "val";
      return `<span class="${cls}">${fmt(s.value)}</span>`;
    });
    const kind = tr.kind === "expr" ? "expr" : "local";
    return `<div class="mrow">
      <span class="mname ${kind}" title="${kind === "expr" ? "watched expression" : "local variable"}">${kind === "expr" ? "⊢" : "•"} ${esc(tr.name)}</span>
      <span class="mpath">${path.join('<span class="arr">→</span>')}</span>
      <span class="mcount">${tr.changes} change${tr.changes === 1 ? "" : "s"} · ${tr.occurrences} hits</span>
    </div>`;
  }).join("");
  return `<div class="mutations">
    <h4>lineage · how values mutated across hits</h4>
    <div class="legend">
      <span class="li"><span class="sym expr">⊢</span> watched expression</span>
      <span class="li"><span class="sym local">•</span> local variable</span>
      <span class="sep"></span>
      <span class="li"><span class="sw val">9.99</span> initial / unchanged</span>
      <span class="li"><span class="sw chg">14.49</span> changed at this hit</span>
      <span class="li"><span class="sw last">16.49</span> final value</span>
      <span class="li"><span class="arr">→</span> mutation step</span>
    </div>
    ${rows}</div>`;
}

function renderEvent(e) {
  const a = e.attrs || {};
  const secs = [];
  if (a.locals && Object.keys(a.locals).length) secs.push(`<div class="sec"><h4>locals</h4>${kvTable(a.locals)}</div>`);
  if (a.exprs && Object.keys(a.exprs).length) secs.push(`<div class="sec"><h4>watch</h4>${kvTable(a.exprs)}</div>`);
  if (a.stack && a.stack.length) secs.push(`<div class="sec"><h4>stack</h4><div class="stack">${a.stack.map((f) => `<div>${esc(f).replace(/^([^ (]+)/, "<b>$1</b>")}</div>`).join("")}</div></div>`);
  const locStr = e.loc ? `${e.loc.file}:${e.loc.line ?? ""}` : "";
  return `<div class="evt">
    <div class="head">
      <span class="seq">#${e.seq}</span>
      <span class="kind">${esc(e.kind)}</span>
      <span class="label">${esc(e.label || "")}</span>
      <span class="loc">${esc(locStr)}</span>
      <span class="t">+${e.t}ms</span>
    </div>
    <div class="body">${secs.join("") || '<span style="color:var(--muted)">no locals captured</span>'}</div>
  </div>`;
}

async function select(id) {
  selected = id;
  renderList();
  const env = await fetch("/api/sessions/" + encodeURIComponent(id)).then((r) => r.json()).catch(() => null);
  if (!env) { detailEl.innerHTML = `<div class="empty">not found</div>`; return; }
  const d = env.data || {}, t = env.target || {}, m = env.meta || {};
  const extras = [];
  if (d.response) extras.push(`<div class="sec" style="padding:0 20px"><h4>response</h4><pre class="resp">exit ${d.response.exitCode} · ${esc(d.response.body || "")}</pre></div>`);
  if (d.console && d.console.length) extras.push(`<div class="sec" style="padding:0 20px"><h4>console</h4><pre class="resp">${esc(d.console.map((c) => `[${c.type}] ${c.text}`).join("\n"))}</pre></div>`);
  if (d.network && d.network.length) extras.push(`<div class="sec" style="padding:0 20px"><h4>network (≥400)</h4><pre class="resp">${esc(d.network.map((n) => `${n.status} ${n.url}`).join("\n"))}</pre></div>`);
  detailEl.innerHTML = `
    <div class="dhead">
      <div class="cmd">${esc(env.command)} ${srcBadge(t.source)}</div>
      <div class="meta">
        <span>${esc(m.at || "")}</span>
        ${m.durationMs != null ? `<span>${m.durationMs}ms</span>` : ""}
        <span>${(d.events || []).length} events</span>
        <span style="color:var(--muted)">${esc(m.sessionId || "")}</span>
      </div>
      ${t.trigger ? `<div class="trigger">${esc(t.trigger)}</div>` : ""}
    </div>
    ${(env.diagnostics || []).map((g) => `<div class="diag ${g.level}">${esc(g.message)}</div>`).join("")}
    ${renderRecording(d.recording)}
    ${renderMutations(d.lineage)}
    <div class="events">${(d.events || []).map(renderEvent).join("") || '<div class="empty">no events</div>'}</div>
    ${extras.join("")}`;
}

listEl.addEventListener("click", (e) => { const c = e.target.closest(".card"); if (c) select(c.dataset.id); });
detailEl.addEventListener("click", (e) => { const h = e.target.closest(".evt > .head"); if (h) h.parentElement.classList.toggle("open"); });
$("#clear").addEventListener("click", async () => { await fetch("/api/sessions", { method: "DELETE" }); sessions.clear(); selected = null; renderList(); detailEl.innerHTML = `<div class="empty">cleared</div>`; });

async function boot() {
  const rows = await fetch("/api/sessions").then((r) => r.json()).catch(() => []);
  for (const s of rows) sessions.set(s.sessionId, s);
  renderList();
}
function connect() {
  const es = new EventSource("/api/stream");
  es.addEventListener("hello", () => { $("#dot").classList.add("on"); $("#livetxt").textContent = "live"; });
  es.onmessage = (ev) => {
    const s = JSON.parse(ev.data);
    const isNew = !sessions.has(s.sessionId);
    sessions.set(s.sessionId, s);
    renderList();
    if (isNew) { const c = listEl.querySelector(`.card[data-id="${CSS.escape(s.sessionId)}"]`); if (c) c.classList.add("flash"); }
    if (selected === s.sessionId) select(s.sessionId);
  };
  es.onerror = () => { $("#dot").classList.remove("on"); $("#livetxt").textContent = "reconnecting…"; };
}
boot(); connect();
</script>
</body>
</html>
