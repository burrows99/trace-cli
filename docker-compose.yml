# Run the trace collector + realtime UI:
#   docker compose up --build
#   open http://localhost:4747
#
# Emit traces to it from the host (the CLI runs where your debug target is reachable):
#   trace dynamic --python 5678 --bp app.py:42 --curl '…' --emit http://localhost:4747
services:
  trace-collector:
    build: .
    image: trace-cli
    container_name: trace-collector
    ports:
      - "4747:4747"
    volumes:
      - ./.trace-data:/data
    environment:
      - TRACE_DATA=/data
    restart: unless-stopped
