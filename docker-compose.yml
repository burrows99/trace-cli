# Optional collector stack only: realtime UI/API collector, Postgres (session store), and local S3 (mock-aws) for recordings.
# The `trace` CLI itself is native-first and should run on the host where debug targets are reachable.
#   docker compose up --build
#   open http://localhost:4747          # the trace UI (sessions persisted in Postgres)
#   open http://localhost:9001          # mock-aws (MinIO) console — minioadmin / minioadmin
#   psql postgres://trace:trace@localhost:5432/trace -c 'select session_id, at from trace_sessions;'
#
# Emit traces from the host (the CLI runs where your debug target is reachable). Chrome traces record by
# default and upload the video to mock-aws, attaching a link to the trace:
#   export S3_ENDPOINT=http://localhost:9000
#   TRACE_COLLECTOR_URL=http://localhost:4747 trace dynamic --chrome 9222 --url http://localhost:3000 --bp src/App.tsx:9
#
# Bringing the stack up runs the whole end-to-end demo too (Node + React + Chrome targets, all in
# one demo container), no host setup — `docker compose up --build` starts everything; `docker compose down` stops it all:
#   docker compose up --build                       # then watch all 3 traces (incl. the React video) at :4747
services:
  trace-collector:
    build: .
    image: trace-cli
    container_name: trace-collector
    ports:
      - "4747:4747"
    environment:
      # The collector is database-driven: sessions persist in Postgres (the `db` service).
      - DATABASE_URL=postgres://trace:trace@db:5432/trace
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Postgres — the session store. The collector persists every trace envelope here (JSONB) via DATABASE_URL;
  # in production you point DATABASE_URL at a managed Postgres instead — no code change.
  db:
    image: postgres:16
    container_name: trace-db
    environment:
      - POSTGRES_USER=trace
      - POSTGRES_PASSWORD=trace
      - POSTGRES_DB=trace
    ports:
      - "5432:5432"   # connect from the host: DATABASE_URL=postgres://trace:trace@localhost:5432/trace
    volumes:
      - ./.trace-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace -d trace"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # S3-compatible object store standing in for AWS S3. The CLI talks the S3 API (AWS SDK) to it; in
  # production you point S3_ENDPOINT at real AWS instead — no code change.
  mock-aws:
    image: minio/minio
    container_name: mock-aws
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API endpoint → set S3_ENDPOINT=http://localhost:9000
      - "9001:9001"   # web console
    volumes:
      - ./.mock-aws-data:/data
    restart: unless-stopped

  # ───────────────────────── demo (one container, comes up/down with the stack) ─────────────────────────
  # The whole self-contained run of test/servers/scenarios.sh, collapsed into ONE container. It starts the
  # Node/React apps being traced + a headless Chrome on its own loopback, waits for them and the
  # collector, then drives all 3 scenarios once (uploading the React video to mock-aws) and exits. One
  # container = one network namespace, so every target is on 127.0.0.1 (exactly as the CLI's localhost
  # discovery expects) and all app/debug ports stay inside it — no shared-netns anchor, no host clashes.
  demo:
    build:
      context: .
      dockerfile: test/servers/runner/Dockerfile
    image: trace-demo
    container_name: trace-demo
    working_dir: /app
    volumes:
      - ./test/servers:/app/test/servers:ro     # scenarios + app sources (live-editable, no rebuild)
    environment:
      - TRACE_COLLECTOR_URL=http://trace-collector:4747
      - S3_ENDPOINT=http://mock-aws:9000        # upload the recording here (in-network)
      - S3_PUBLIC_URL=http://localhost:9000      # …but store a host-reachable link for the browser
      - S3_BUCKET=traces
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    depends_on:
      - trace-collector
    restart: "no"
