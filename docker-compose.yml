# Run the trace collector + realtime UI, Postgres (session store), and a local S3 (mock-aws) for recordings:
#   docker compose up --build
#   open http://localhost:4747          # the trace UI (sessions persisted in Postgres)
#   open http://localhost:9001          # mock-aws (MinIO) console — minioadmin / minioadmin
#   psql postgres://trace:trace@localhost:5432/trace -c 'select session_id, at from trace_sessions;'
#
# Emit traces from the host (the CLI runs where your debug target is reachable). Chrome traces record by
# default and upload the video to mock-aws, attaching a link to the trace:
#   export S3_ENDPOINT=http://localhost:9000
#   trace dynamic --chrome 9222 --url http://localhost:3000 --bp src/App.tsx:9 --emit http://localhost:4747
#
# Bringing the stack up runs the whole end-to-end demo too (Node + Python + React + Chrome targets + a runner),
# with no host setup — `docker compose up --build` starts everything; `docker compose down` stops it all:
#   docker compose up --build                       # then watch all 5 traces (incl. the React video) at :4747
services:
  trace-collector:
    build: .
    image: trace-cli
    container_name: trace-collector
    ports:
      - "4747:4747"
    environment:
      # The collector is database-driven: sessions persist in Postgres (the `db` service).
      - DATABASE_URL=postgres://trace:trace@db:5432/trace
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Postgres — the session store. The collector persists every trace envelope here (JSONB) via DATABASE_URL;
  # in production you point DATABASE_URL at a managed Postgres instead — no code change.
  db:
    image: postgres:16
    container_name: trace-db
    environment:
      - POSTGRES_USER=trace
      - POSTGRES_PASSWORD=trace
      - POSTGRES_DB=trace
    ports:
      - "5432:5432"   # connect from the host: DATABASE_URL=postgres://trace:trace@localhost:5432/trace
    volumes:
      - ./.trace-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace -d trace"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # S3-compatible object store standing in for AWS S3. The CLI talks the S3 API (AWS SDK) to it; in
  # production you point S3_ENDPOINT at real AWS instead — no code change.
  mock-aws:
    image: minio/minio
    container_name: mock-aws
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API endpoint → set S3_ENDPOINT=http://localhost:9000
      - "9001:9001"   # web console
    volumes:
      - ./.mock-aws-data:/data
    restart: unless-stopped

  # ───────────────────────── demo group (comes up/down with the rest of the stack) ─────────────────────────
  # A fully self-contained run of test/servers/scenarios.sh: the Node/Python/React apps being traced, a headless
  # Chrome, and a scenario-runner that drives them and emits every trace to the collector (with the React video
  # uploaded to mock-aws). The trace CLI discovers debug targets on localhost only, so the whole group shares ONE
  # network namespace (the `demo-net` anchor) — every service sees the others on 127.0.0.1, exactly like running
  # the servers by hand. Internal app/debug ports stay off the host (no clash with anything you run locally).

  # Network anchor: holds the shared netns for the demo group and bridges it to the core services (collector, s3).
  demo-net:
    image: alpine:3.20
    container_name: trace-demo-net
    command: ["sleep", "infinity"]
    restart: unless-stopped

  # Node order-API / BFF (:3100), under the inspector on :9230. Calls the Python tax service over localhost.
  node-api:
    image: node:22-slim
    container_name: trace-demo-node-api
    network_mode: "service:demo-net"
    working_dir: /app
    volumes:
      - ./test/servers:/app/test/servers:ro
    environment:
      - PORT=3100
      - TAX_SVC=http://127.0.0.1:3101
    command: ["node", "--inspect=9230", "test/servers/node-api/server.js"]
    depends_on: [demo-net]
    restart: unless-stopped

  # Python tax service (:3101), debugpy on :5679.
  python-api:
    build:
      context: .
      dockerfile: test/servers/python-api/Dockerfile
    image: trace-demo-python
    container_name: trace-demo-python-api
    network_mode: "service:demo-net"
    working_dir: /app
    volumes:
      - ./test/servers:/app/test/servers:ro
    environment:
      - PORT=3101
      - DEBUG_PORT=5679
    depends_on: [demo-net]
    restart: unless-stopped

  # React checkout UI (Vite dev server :5180, strictPort + source maps for the Chrome trace).
  react-app:
    image: node:22-slim
    container_name: trace-demo-react-app
    network_mode: "service:demo-net"
    working_dir: /app
    volumes:
      - ./test/servers/react-app:/app
      - /app/node_modules          # anonymous volume: keep Linux deps, don't inherit the host's macOS node_modules
    # --host 0.0.0.0: bind all interfaces (vite defaults to localhost→::1, but the runner/Chrome reach it on 127.0.0.1).
    command: ["sh", "-lc", "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"]
    depends_on: [demo-net]
    restart: unless-stopped

  # Headless Chrome being traced (CDP on :9334). Reuses the runner image (it already ships Chromium).
  chrome:
    image: trace-demo-runner
    container_name: trace-demo-chrome
    network_mode: "service:demo-net"
    command:
      - "/usr/bin/chromium"
      - "--headless=new"
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      - "--disable-gpu"
      - "--remote-debugging-port=9334"
      - "--remote-debugging-address=127.0.0.1"
      - "--remote-allow-origins=*"
      - "--user-data-dir=/tmp/chrome-trace"
      - "about:blank"
    depends_on: [demo-net]
    restart: unless-stopped

  # The driver: waits for every target + the collector, then runs all 5 scenarios once and exits.
  scenario-runner:
    build:
      context: .
      dockerfile: test/servers/runner/Dockerfile
    image: trace-demo-runner
    container_name: trace-demo-runner
    network_mode: "service:demo-net"
    working_dir: /app
    volumes:
      - ./test/servers:/app/test/servers:ro
    environment:
      - TRACE_COLLECTOR_URL=http://trace-collector:4747
      - S3_ENDPOINT=http://mock-aws:9000        # upload the recording here (in-network)
      - S3_PUBLIC_URL=http://localhost:9000      # …but store a host-reachable link for the browser
      - S3_BUCKET=traces
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    depends_on:
      - demo-net
      - node-api
      - python-api
      - react-app
      - chrome
      - trace-collector
    restart: "no"
